name = "honeytranslationsuae-pages"
compatibility_date = "2026-05-12"
pages_build_output_dir = "dist"

[vars]
# Primary backend origin used by Pages Functions (recommended).
CMS_API_ORIGIN = ""

# Optional frontend CORS allowlist used by Pages Functions responses.
CMS_CORS_ORIGIN = "https://honeytranslationsuae.pages.dev,https://honeytranslations.ae"

# Optional: comma-separated fallback origins for automatic backend discovery.
CMS_API_FALLBACK_ORIGINS = ""
